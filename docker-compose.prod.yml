# Production Docker Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - .env.prod exists (run scripts/gen-env.sh to generate it)
#   - TLS certificate at /etc/letsencrypt/live/${SERVER_NAME}/ (run scripts/setup-server.sh)
#   - SERVER_NAME set in .env.prod and substituted in infra/nginx/nginx.conf
#
# Differences from docker-compose.yml (dev):
#   - No source bind-mounts: images are self-contained (api/Dockerfile.prod, worker/Dockerfile.prod)
#   - Build context is repo root so shared/ is baked into both images
#   - No public ports for internal services (postgres, redis, qdrant, worker metrics, prometheus)
#   - Grafana bound to 127.0.0.1 only — access via SSH tunnel (see docs/deployment.md)
#   - Nginx terminates TLS on ports 80/443
#   - Redis protected by password
#   - Grafana requires admin login
#   - All containers have log rotation to prevent disk exhaustion
#   - Worker concurrency raised to 2 (tune to CPU count)

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ─── Infrastructure ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-agentdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # No host port — internal network only
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Require a password for all connections
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    env_file: .env.prod
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging: *default-logging

  # ─── Application ───────────────────────────────────────────────────────

  api:
    build:
      context: .                      # repo root — gives Dockerfile access to shared/
      dockerfile: api/Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - PYTHONPATH=/app
    # No host port — nginx proxies to this container over the internal network
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - PYTHONPATH=/app
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # required for Docker sandbox backend
    # --concurrency=2 is a safe default for a single VM.
    # Increase if CPU/RAM allows; pair with PROMETHEUS_MULTIPROC_DIR for multi-process metrics.
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    logging: *default-logging

  # ─── Reverse proxy / TLS ───────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks: [internal]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro      # certbot-managed certificates
      - certbot_www:/var/www/certbot:ro            # ACME challenge webroot
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  # ─── Observability ─────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    networks: [internal]
    # No host port — Prometheus is internal; Grafana reaches it over the Docker network.
    # Access manually via SSH tunnel: ssh -L 9091:localhost:9091 user@server
    # (add "- '127.0.0.1:9091:9090'" to ports if you need SSH tunnel access)
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.listen-address=:9090"
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    # Bound to 127.0.0.1 only — not reachable from the internet.
    # Access via SSH tunnel:  ssh -L 3000:localhost:3000 user@server
    # Then open:              http://localhost:3000
    ports:
      - "127.0.0.1:3000:3000"
    networks: [internal]
    env_file: .env.prod
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_ALLOW_EMBEDDING=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    logging: *default-logging

  # ─── Optional: Qdrant memory layer ────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:v1.9.0
    restart: unless-stopped
    networks: [internal]
    # No host port — internal only; enable MEMORY_ENABLED=true in .env.prod to use.
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  qdrant_data:
  certbot_www:
