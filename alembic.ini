[alembic]
# Location of migration scripts, relative to this file (project root)
script_location = api/migrations

# Add project root to sys.path so `api.*` imports work when running alembic locally
prepend_sys_path = .

# Fallback URL — overridden by DATABASE_URL env var in env.py.
# Edit for local runs without the Docker environment:
sqlalchemy.url = postgresql+asyncpg://agent:agentpass@localhost:5432/agentdb

# Length of auto-generated revision IDs
rev_id_template = %%(year)d%(month).2d%(day).2d_%(rev)s

[post_write_hooks]
# Leave empty — add ruff/black formatting hooks here if desired

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
