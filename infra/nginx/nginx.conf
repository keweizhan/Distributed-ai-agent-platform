worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # NOTE: security headers are set per-server block below, not here.
    # nginx does NOT inherit add_header from a parent block when the child
    # block defines any add_header of its own (this is a known nginx behaviour).

    # Upstream: FastAPI
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME challenge for Let's Encrypt renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS — public API ───────────────────────────────────────────────
    # Replace SERVER_NAME with your actual domain (see docs/deployment.md).
    server {
        listen 443 ssl http2;
        server_name SERVER_NAME;

        # TLS certificate (managed by certbot — see docs/deployment.md)
        ssl_certificate     /etc/letsencrypt/live/SERVER_NAME/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SERVER_NAME/privkey.pem;

        # Modern TLS config
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # Security headers — all defined here so they are actually sent
        # (nginx does not inherit add_header from the http block when a server
        # block defines its own add_header directives)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           DENY                always;
        add_header X-Content-Type-Options    nosniff             always;
        add_header X-XSS-Protection          "1; mode=block"     always;
        add_header Referrer-Policy           no-referrer-when-downgrade always;

        # Request size limit (protects against large prompt uploads)
        client_max_body_size 1m;

        # Proxy to FastAPI
        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeout for long-running LLM planning requests
            proxy_read_timeout    120s;
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
        }
    }
}
